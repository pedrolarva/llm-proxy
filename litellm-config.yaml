model_list:
  - model_name: "gemini-enterprise"
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/GEMINI_API_KEY
      rpm: 10 # Rate limit per provider
  - model_name: "gemini-enterprise"
    litellm_params:
      model: gemini/gemini-1.5-pro
      api_key: os.environ/GEMINI_API_KEY

router_settings:
  routing_strategy: "latency-based-routing" # Kong-like smart routing
  set_verbose: true

litellm_settings:
  drop_params: true
  success_callback: ["postgres", "redis", "prometheus"]
  failure_callback: ["postgres", "prometheus"]
  # callbacks: ["custom_callbacks.presidio_handler"]
  
  master_key: "sk-master-token"
  store_model_in_db: true # Required for virtual keys
  proxy_budget_resilient: true
  
  cache: true
  cache_params:
    type: "redis"
    host: "redis"
    port: 6379

general_settings:
  master_key: "sk-master-token"
  database_url: "postgresql://user:litellm123@postgres:5432/litellm"
