name: CI Functional Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create .env file
        run: |
          echo "LITELLM_MASTER_KEY=sk-master-token" >> .env
          echo "GEMINI_API_KEY=mock-key" >> .env
          echo "DATABASE_URL=postgresql://user:password@postgres:5432/litellm" >> .env
          echo "POSTGRES_PASSWORD=password" >> .env

      - name: Start Infrastructure
        run: docker compose up -d

      - name: Wait and Run Tests
        run: ./tests/functional_check.sh

      - name: Container Logs on Failure
        if: failure()
        run: |
          docker compose ps
          docker compose logs
