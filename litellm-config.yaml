model_list:
  - model_name: "gemini-enterprise"
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/GEMINI_API_KEY
      rpm: 10 # Rate limit per provider
  - model_name: "gemini-enterprise"
    litellm_params:
      model: gemini/gemini-1.5-pro
      api_key: os.environ/GEMINI_API_KEY

router_settings:
  routing_strategy: "latency-based-routing" # Kong-like smart routing
  set_verbose: true

litellm_settings:
  drop_params: true
  success_callback: ["postgres", "redis"] # Grava logs no DB
  failure_callback: ["postgres"]
  callbacks: ["custom_callbacks.presidio_handler"]
  
  master_key: os.environ/LITELLM_MASTER_KEY
  store_model_in_db: true # Required for virtual keys
  proxy_budget_resilient: true
  
  cache: true
  cache_params:
    type: "redis-semantic"
    redis_semantic_cache_embedding_model: "openai/text-embedding-3-small"

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY # Deve ser exportada no docker-compose.yml
  database_url: "postgresql://user:password@postgres:5432/litellm"
